<!DOCTYPE html>
<html>
  <head>
    <title>ROCK PAPER SCISSORS</title>
    <link rel="stylesheet" href="style/rock-paper-scissors.css">
  </head>
    <body>
      <p class="title">
        ROCK PAPER SCISSORS GAME</p>
        <div class="moves-container">
          <button class="move-button js-rock-button"><img src="images/rock-emoji.png" class="move-icon"></button>
          
          <button class="move-button js-paper-button"><img src="images/paper-emoji.png" class="move-icon"></button>
          
          <button class="move-button js-scissor-button"><img src="images/scissors-emoji.png"class="move-icon"></button>
        </div>

        <p class="js-result result"></p>
        <p class="js-moves moves"></p>
        <p class="js-score scores"></p>

        <button class="reset-button js-reset-button">RESET SCORE</button>

        <button class="auto-play-button js-auto-play-button">AUTO PLAY</button>
        
      </p>
      <script src="script/rock-paper-scissor.js"></script>
    </body>
</html>
